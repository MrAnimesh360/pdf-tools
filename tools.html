<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Tools Workspace</title>
  <meta name="description" content="Client-side PDF toolkit with merge, split, convert, edit, optimize, and metadata tools." />
  <link rel="stylesheet" href="css/tools.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1>PDF Tools</h1>
      <p class="muted">Private by design. Everything runs in your browser.</p>
      <input id="tool-search" type="search" placeholder="Search tools..." />
      <div class="filters" id="category-filters"></div>
      <div id="tool-list" class="tool-list"></div>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div>
          <h2 id="tool-title">Select a tool</h2>
          <p id="tool-subtitle" class="muted">Choose a tool from the left panel.</p>
        </div>
      </header>
      <div id="drop-zone" class="drop-zone">Drag and drop files here</div>
      <div id="status" class="status"></div>
      <section id="tool-container"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>
  <script src="js/pdf-engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
